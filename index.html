<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>x402 デモ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>x402 デモ</h1>
        <p class="muted">
          「支払いが必要な情報アクセス」をブロックチェーン決済で体験できるデモです。
        </p>
        

        
      </header>

      <section class="card" aria-labelledby="inputTitle">
        <h2 id="inputTitle">問題</h2>
        <p class="muted">ブロックチェーンの生みの親とされているのは何者か？</p>
        <div class="row">
          <button id="runDetailed" class="button" type="button">
            回答を見る
          </button>
        </div>
        <p id="inputError" class="error" role="status" aria-live="polite"></p>
      </section>

      <!-- x402 ワークフロー進捗カード -->
      <section class="card" id="progressCard" aria-label="x402 ワークフロー進捗">
        <h2 id="progressTitle">x402 ワークフロー</h2>
        <div id="x402-progress" class="x402-progress" aria-hidden="false">
          <div class="step" data-step="0">リクエスト</div>
          <div class="step" data-step="1">支払い要求</div>
          <div class="step" data-step="2">支払い中</div>
          <div class="step" data-step="3">検証</div>
          <div class="step" data-step="4">トークン発行</div>
          <div class="step" data-step="5">詳細表示</div>
        </div>
      </section>

      <section class="grid" aria-label="回答">
        <div class="card" aria-labelledby="freeTitle">
          <h2 id="freeTitle">回答</h2>
          <pre id="freeResult" class="pre" aria-live="polite"></pre>
        </div>

        <div class="card" aria-labelledby="paidTitle">
          <h2 id="paidTitle">回答詳細（有料）</h2>
          <div id="paidArea" aria-live="polite"></div>
        </div>
      </section>

      
    <footer class="footer">
      <span id="paymentBadge" class="badge" aria-live="polite"></span>
      <div class="wallet-row">
        <span id="swBadge" class="badge" aria-live="polite"></span>
        <button id="resetState" class="button" type="button">状態をリセット</button>
      </div>
    </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
